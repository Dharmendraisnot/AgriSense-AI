[tool.pytest.ini_options]
testpaths   = ["tests"]
asyncio_mode = "auto"
addopts     = "-v --tb=short --cov=. --cov-report=term-missing --ignore=venv --ignore=env1 --ignore=env2 --ignore=mainenv"

[tool.coverage.run]
source = ["agents", "rag", "backend", "config", "utils"]
omit   = ["*/test*", "venv/*", "*/migrations/*"]
